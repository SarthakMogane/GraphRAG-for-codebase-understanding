<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GraphRAG Code Assistant</title>
<style>
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; max-width:1000px; margin:40px auto; padding:20px; line-height:1.6; background:#0d1117; color:white; }
.hidden { display:none !important; }
.card { border:1px solid #30363d; padding:20px; border-radius:16px; margin-bottom:20px; background:#161b22; }
input[type="text"], input[type="password"] { width:100%; padding:12px; margin:10px 0; border:1px solid #30363d; border-radius:8px; background:#0d1117; color:white; box-sizing:border-box; }
button.primary { background:#238636; color:white; border:none; padding:12px 20px; border-radius:8px; cursor:pointer; font-size:16px; font-weight:bold; }
button.primary:hover { background:#2ea043; }
button.secondary { background:#21262d; border:1px solid #30363d; color:white; padding:12px 20px; border-radius:8px; cursor:pointer; font-size:16px; font-weight:bold; }
button.secondary:hover { background:#30363d; }

/* REPO DASHBOARD */
.repo-list { display:flex; flex-direction:column; gap:16px; }
.repo-card { background:#161b22; border:1px solid #30363d; border-radius:18px; padding:20px; display:flex; justify-content:space-between; align-items:center; }
.repo-left { display:flex; gap:18px; align-items:flex-start; }
.repo-icon { width:56px; height:56px; border-radius:14px; background:#0d1117; display:flex; align-items:center; justify-content:center; font-size:24px; }
.repo-name { font-size:20px; font-weight:700; }
.repo-meta { color:#8b949e; font-size:14px; }
.repo-right { display:flex; align-items:center; gap:16px; }
.repo-btn { background:#21262d; border:1px solid #30363d; color:white; padding:10px 18px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; }
.repo-btn:hover { background:#30363d; }

/* BADGES */
.badge { padding:6px 12px; border-radius:999px; font-size:13px; font-weight:700; }
.badge-indexed { background:#16361f; color:#56d364; }
.badge-stale { background:#3d2e0f; color:#f5b642; }
.badge-not-indexed { background:#2d333b; color:#c9d1d9; }
.score-badge { background:#16361f; color:#56d364; font-family:monospace; font-size:12px; padding:2px 6px; border-radius:4px; }

/* SCOUT UI */
.scout-header { margin-bottom: 20px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
.scout-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #21262d; }
.scout-item-left { display: flex; align-items: center; gap: 12px; }
.scout-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: #238636; }
.scout-item-title { font-weight: 600; font-size: 15px; }
.scout-item-meta { color: #8b949e; font-size: 13px; margin-left: 8px; }

.spinner { display:inline-block; width:20px; height:20px; border:3px solid rgba(255,255,255,.3); border-radius:50%; border-top-color:#fff; animation:spin 1s ease-in-out infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<h1>🧠 GraphRAG Code Assistant</h1>

<div id="login-section" class="card hidden">
    <h2>Welcome to the demo</h2>
    <button class="primary" onclick="window.location.replace('http://127.0.0.1:8000/auth/login')">Login with GitHub</button>
</div>

<div id="connect-section" class="card hidden" style="text-align:center;">
    <h2>Connect your Code</h2>
    <button class="primary" onclick="waitForInstall()">Connect GitHub Repositories</button>
</div>

<div id="setup-section" class="card hidden">
    <h3>Your repositories</h3>
    <div id="repo-list" class="repo-list">Loading repositories...</div>
</div>

<div id="scout-section" class="card hidden">
    <div class="scout-header">
        <h2 id="scout-title">Select what to index</h2>
    </div>
    
    <div id="scout-subprojects"></div>
    <div id="scout-submodules" style="margin-top: 20px;"></div>
    
    <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:20px;">
        <button class="secondary" onclick="cancelScout()">Cancel</button>
        <button class="primary" id="confirm-scout-btn">Confirm & Index ↗</button>
    </div>
</div>

<script>
window.onload = () => {
    const urlParams = new URLSearchParams(window.location.search);
    const status = urlParams.get('status');
    const error = urlParams.get('error');
    const notice = urlParams.get('notice'); // <-- NEW

    // 1. Catch Marketplace Installs (User isn't logged in yet)
    if (notice) {
        window.history.replaceState({}, document.title, window.location.pathname);
        if (notice === 'finish_github_install') {
            alert("GitHub connection successful! Please log in to complete your setup.");
            document.getElementById('login-section').classList.remove('hidden');
            // We return early here so it stops and waits for them to log in
            return; 
        }
    }

    // 1. Catch Webhook Redirects & Errors
    if (error) {
        window.history.replaceState({}, document.title, window.location.pathname);
        if (error === 'installation_canceled') {
            alert("You canceled the GitHub connection.");
        } else if (error === 'csrf_failed') {
            alert("Security check failed. Please log in and try again.");
            document.getElementById('login-section').classList.remove('hidden');
            return;
        }
    }

    if (status) {
        window.history.replaceState({}, document.title, window.location.pathname);
        if (status === 'installed' || status === 'updated') {
            document.getElementById('setup-section').classList.remove('hidden');
            // Trigger fetch immediately, it will handle the polling
            fetchRepos(); 
            return;
        }
    }

    // 2. Normal Auth Check
    checkAuthAndLoad();
};

async function checkAuthAndLoad() {
    try {
        const res = await fetch('http://127.0.0.1:8000/auth/status', { credentials: 'include' });
        if (res.ok) {
            const data = await res.json();
            if (data.is_installed) {
                document.getElementById('setup-section').classList.remove('hidden');
                fetchRepos(); 
            } else {
                document.getElementById('connect-section').classList.remove('hidden');
            }
        } else {
            document.getElementById('login-section').classList.remove('hidden');
        }
    } catch (e) { document.getElementById('login-section').classList.remove('hidden'); }
}

function waitForInstall() {
    window.location.href = 'http://127.0.0.1:8000/auth/install';
}

/* =========================================
1. DB-ONLY REPO FETCHING & POLLING
========================================= */
let pollingTimer = null;

async function fetchRepos() {
    try {
        const res = await fetch('http://127.0.0.1:8000/api/repos', { credentials: 'include' });
        if (!res.ok) throw new Error("Fetch failed");
        
        const data = await res.json();
        const repos = data.repos; // FIX: Extract array from backend wrapper
        
        const repoListDiv = document.getElementById('repo-list');
        repoListDiv.innerHTML = '';

        if (repos.length === 0) {
            repoListDiv.innerHTML = `
                <div style="text-align:center; padding: 40px 20px; color: #8b949e; background: #161b22; border-radius: 12px; border: 1px dashed #30363d;">
                    <div class="spinner" style="border-top-color: #58a6ff; margin-bottom: 15px;"></div>
                    <p style="margin:0; font-weight: 600; color: white;">Syncing with GitHub</p>
                    <p style="margin-top: 5px; font-size: 14px;">Importing your repositories securely. This usually takes a few seconds.</p>
                </div>
            `;
            // Keep polling every 3 seconds until the webhook finishes!
            if (pollingTimer) clearTimeout(pollingTimer);
            pollingTimer = setTimeout(fetchRepos, 3000);
            return; // Stop running the rest of the function
        }

        let isAnythingIndexing = false;

        repos.forEach(repo => {
            const uiStatus = repo.index_status || 'not_indexed'; // FIX: map to index_status column
            
            // Check if we need to keep polling
            if (uiStatus === 'indexing' || uiStatus === 'pending') {
                isAnythingIndexing = true;
            }
            
            const card = document.createElement('div');
            card.className = 'repo-card';
            card.innerHTML = `
                <div class="repo-left">
                    <div class="repo-icon">${repo.is_private ? '🔒' : '🌍'}</div>
                    <div class="repo-content">
                        <div class="repo-name">${repo.full_name}</div>
                        <div class="repo-meta">ID: ${repo.id} · Updated: ${new Date(repo.updated_at).toLocaleDateString()}</div>
                    </div>
                </div>
                <div class="repo-right">
                    ${buildStatusBadge(repo, uiStatus)}
                    ${buildActionButton(repo, uiStatus)}
                </div>
            `;
            repoListDiv.appendChild(card);
        });

        // FIX: The Smart Poller - Only poll if something is actually indexing
        if (pollingTimer) clearTimeout(pollingTimer);
        if (isAnythingIndexing) {
            pollingTimer = setTimeout(fetchRepos, 3000); // Check DB every 3 seconds
        }

    } catch (err) {
        console.error(err);
    }
}

function buildStatusBadge(repo, status) {
    if (status === 'ready') return `<div class="badge badge-indexed">✓ Indexed</div>`;
    if (status === 'stale') return `<div class="badge badge-stale">◷ Stale</div>`;
    
    // FIX: Progress logic safely wrapped inside the builder function
    if (status === 'indexing' || status === 'pending') {
        if (repo.files_total > 0) {
            const percent = Math.round((repo.files_accepted / repo.files_total) * 100);
            return `
                <div style="display:flex; align-items:center; gap:12px;">
                    <div class="badge badge-indexing">Indexing</div>
                    <div class="progress" title="${repo.files_accepted} / ${repo.files_total} files">
                        <div class="progress-bar" style="width: ${percent}%;"></div>
                    </div>
                    <div class="small-text">${repo.files_accepted} files...</div>
                </div>
            `;
        }
        return `
            <div style="display:flex; align-items:center; gap:12px;">
                <div class="badge badge-indexing">Starting...</div>
                <div class="spinner" style="width:14px; height:14px; border-width:2px; border-top-color:#58a6ff;"></div>
            </div>
        `;
    }

    return `<div class="badge badge-not-indexed">Not indexed</div>`;
}

function buildActionButton(repo, status) {
    if (repo.is_private === false) {
        return `<button class="repo-btn" disabled style="opacity:0.5; cursor:not-allowed;">🔒 Private Only</button>`;
    }
    if (status === 'ready') {
        return `<button class="repo-btn">View wiki ↗</button>`;
    }
    if (status === 'indexing' || status === 'pending') {
        return ``; // Hide button while indexing
    }
    return `<button class="repo-btn" onclick="initiateIndex(${repo.id}, '${repo.full_name}')">Index ↗</button>`;
}

/* =========================================
2. THE SCOUT PIPELINE
========================================= */
async function initiateIndex(repoId, repoName) {
    try {
        const res = await fetch(`http://127.0.0.1:8000/api/repos/${repoId}/index`, {
            method: 'POST',
            credentials: 'include'
        });
        const data = await res.json();
        
        if (data.next === "scout") {
            loadScoutUI(repoId, repoName);
        }
    } catch (err) { alert("Pipeline validation failed."); }
}

async function loadScoutUI(repoId, repoName) {
    document.getElementById('setup-section').classList.add('hidden');
    const scoutSection = document.getElementById('scout-section');
    scoutSection.classList.remove('hidden');
    
    document.getElementById('scout-title').innerText = `Select what to index — ${repoName}`;
    const projDiv = document.getElementById('scout-subprojects');
    const modDiv = document.getElementById('scout-submodules');
    
    projDiv.innerHTML = `<div class="spinner"></div> Scanning structure...`;
    modDiv.innerHTML = '';

    try {
        const res = await fetch(`http://127.0.0.1:8000/api/repos/${repoId}/scout`, { credentials: 'include' });
        const payload = await res.json();
        const scout = payload.scout;

        renderScoutItems(scout, repoId);
    } catch (err) {
        projDiv.innerHTML = `<span style="color:red">Failed to load scout data.</span>`;
    }
}

function renderScoutItems(scout, repoId) {
    const projDiv = document.getElementById('scout-subprojects');
    const modDiv = document.getElementById('scout-submodules');
    
    if (scout.subprojects && scout.subprojects.length > 0) {
        let html = `<h3>Monorepo subprojects (${scout.monorepo_tooling || 'Auto'})</h3>`;
        scout.subprojects.forEach(p => {
            const checked = p.auto_selected ? "checked" : "";
            html += `
            <div class="scout-item">
                <div class="scout-item-left">
                    <input type="checkbox" class="scout-chk-proj" value="${p.path}" ${checked}>
                    <div>
                        <span class="scout-item-title">${p.name}</span>
                        <span class="scout-item-meta">${p.source_file_count} files · ${p.dependent_count} dependents</span>
                    </div>
                </div>
                <div class="score-badge">${p.score.toFixed(2)}</div>
            </div>`;
        });
        projDiv.innerHTML = html;
    } else {
        projDiv.innerHTML = '';
    }

    if (scout.submodules && scout.submodules.length > 0) {
        let html = `<h3>Submodules</h3>`;
        scout.submodules.forEach(m => {
            const checked = m.auto_selected ? "checked" : "";
            if (m.action_required) {
                html += `
                <div class="scout-item">
                    <div class="scout-item-left">
                        <span style="color:#ff7b72;">◻</span>
                        <div>
                            <span class="scout-item-title">${m.name}</span>
                            <span class="scout-item-meta">App not installed</span>
                        </div>
                    </div>
                    <button class="repo-btn" onclick="window.open('${m.action_url}', '_blank')">Grant Access ↗</button>
                </div>`;
            } else if (m.user_can_toggle) {
                html += `
                <div class="scout-item">
                    <div class="scout-item-left">
                        <input type="checkbox" class="scout-chk-mod" value="${m.path}" ${checked}>
                        <div>
                            <span class="scout-item-title">${m.name}</span>
                            <span class="scout-item-meta">${m.is_private ? 'private' : 'public'}</span>
                        </div>
                    </div>
                    <div class="badge badge-indexed">Ready</div>
                </div>`;
            }
        });
        modDiv.innerHTML = html;
    }

    document.getElementById('confirm-scout-btn').onclick = () => submitSelection(repoId);
}

function cancelScout() {
    document.getElementById('scout-section').classList.add('hidden');
    document.getElementById('setup-section').classList.remove('hidden');
}

/* =========================================
3. SUBMIT SELECTION TO JOBS TABLE
========================================= */
async function submitSelection(repoId) {
    const projBoxes = document.querySelectorAll('.scout-chk-proj:checked');
    const modBoxes = document.querySelectorAll('.scout-chk-mod:checked');
    
    const selected_subprojects = Array.from(projBoxes).map(b => b.value);
    const selected_submodules = Array.from(modBoxes).map(b => b.value);

    const payload = {
        selection_id: Date.now(), 
        repo_id: repoId,
        message: "User confirmed via UI",
        selected_subprojects: selected_subprojects,
        selected_submodules: selected_submodules,
        start_immediately: true
    };

    try {
        document.getElementById('confirm-scout-btn').innerHTML = `<div class="spinner"></div> Starting...`;
        
        await fetch(`http://127.0.0.1:8000/api/repos/${repoId}/select`, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        cancelScout();
        document.getElementById('confirm-scout-btn').innerText = "Confirm & Index ↗";
        
        // This will instantly start drawing the progress bar and polling
        fetchRepos();

    } catch (err) {
        alert("Failed to start indexing job.");
        document.getElementById('confirm-scout-btn').innerText = "Confirm & Index ↗";
    }
}
</script>
</body>
</html>
